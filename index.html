<div class="app">
  <h1>₿ Bitcoin Ultimate Simulator</h1>

  <div id="price">$100,000</div>
  <div id="change">Loading market...</div>
  <div id="marketState">Market: Neutral</div>

  <div class="controls">
    <button onclick="buy()">Buy</button>
    <button onclick="sell()">Sell</button>
    <button onclick="toggle()">Pause</button>
    <button onclick="resetMarket()">Reset</button>
  </div>

  <div class="wallet">
    <p>Cash: <span id="cash">$10,000</span></p>
    <p>BTC: <span id="btc">0</span></p>
    <p>Portfolio: <span id="total">$10,000</span></p>
  </div>

  <div id="news">📢 Waiting for news...</div>

  <canvas id="chart" width="900" height="400"></canvas>

  <footer>
    © 2026 Bitcoin Simulator | Fictional market game, not real financial advice.
  </footer>
</div>
