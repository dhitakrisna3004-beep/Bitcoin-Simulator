<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bitcoin Simulator</title>

<style>
body {
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  text-align: center;
}

#price {
  font-size: 50px;
  font-weight: bold;
}

.controls button {
  margin: 5px;
  padding: 10px;
}

canvas {
  background: #1c1c1c;
  width: 100%;
}

.green { color: lime; }
.red { color: red; }

footer {
  margin-top: 20px;
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<h1>₿ Bitcoin Simulator</h1>

<div id="price">$100,000</div>
<div id="change">Loading...</div>
<div id="marketState">Market: Neutral</div>

<div class="controls">
  <button onclick="buy()">Buy</button>
  <button onclick="sell()">Sell</button>
  <button onclick="toggle()">Pause</button>
</div>

<p>Cash: <span id="cash">$10000</span></p>
<p>BTC: <span id="btc">0</span></p>
<p>Portfolio: <span id="total">$10000</span></p>

<div id="news">Waiting for news...</div>

<canvas id="chart" width="900" height="400"></canvas>

<footer>
© 2026 Bitcoin Simulator (Fictional)
</footer>

<script>
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

let price = 100000;
let prices = [price];

let cash = 10000;
let btc = 0;
let running = true;

function update() {
  if (!running) return;

  let change = (Math.random() - 0.5) * 0.02;

  if (Math.random() < 0.005) change += 0.5; // pump
  if (Math.random() < 0.005) change -= 0.5; // crash

  price *= (1 + change);

  if (price < 500) price = 500;

  prices.push(price);
  if (prices.length > 120) prices.shift();

  document.getElementById("price").textContent =
    "$" + Math.round(price).toLocaleString();

  let pct = change * 100;
  let el = document.getElementById("change");
  el.textContent = pct.toFixed(2) + "%";
  el.className = pct >= 0 ? "green" : "red";

  let total = cash + btc * price;
  document.getElementById("cash").textContent = "$" + cash.toFixed(2);
  document.getElementById("btc").textContent = btc.toFixed(4);
  document.getElementById("total").textContent = "$" + total.toFixed(2);

  draw();
}

function draw() {
  ctx.clearRect(0,0,900,400);

  let max = Math.max(...prices);
  let min = Math.min(...prices);

  ctx.beginPath();

  for (let i=0;i<prices.length;i++){
    let x = i*(900/prices.length);
    let y = 400 - ((prices[i]-min)/(max-min||1))*400;

    if (i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.strokeStyle="lime";
  ctx.stroke();
}

function buy(){
  let amt = 0.01;
  let cost = amt * price;
  if (cash >= cost) {
    cash -= cost;
    btc += amt;
  }
}

function sell(){
  let amt = 0.01;
  if (btc >= amt) {
    btc -= amt;
    cash += amt * price;
  }
}

function toggle(){
  running = !running;
}

setInterval(update, 800);
draw();
</script>

</body>
</html>
